{% extends "base.html" %}

{% block title %}Página não encontrada{% endblock %}

{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:32px 16px;">
  <span style="font-size:80px; margin-bottom:16px;">🐦</span>
  <h1 style="font-size:32px; font-weight:900; color:white; margin-bottom:8px;">Essa página não existe</h1>
  <p style="color:#6b7280; font-size:16px; margin-bottom:32px;">
    O link pode estar quebrado ou a página foi removida.
  </p>
  <a href="/" 
     style="background:#1d9bf0; color:white; font-weight:bold; border-radius:9999px; padding:12px 24px; text-decoration:none; font-size:15px;"
     onmouseover="this.style.background='#1a8cd8'"
     onmouseout="this.style.background='#1d9bf0'">
    Voltar ao início
  </a>
</div>
{% endblock %}
