{% extends "base.html" %}
{% block title %}Alterar senha{% endblock %}

{% block content %}
<div class="sticky top-0 bg-black/80 backdrop-blur-sm border-b border-gray-800 px-4 py-3 z-10 flex items-center gap-4">
  <a href="javascript:history.back()" class="btn-ghost">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
  </a>
  <h1 class="text-xl font-bold">Alterar senha</h1>
</div>

<form method="post" class="p-4 flex flex-col gap-5 max-w-md">
  {% csrf_token %}
  {% for field in form %}
  <div>
    <label class="block text-sm text-gray-400 mb-1">{{ field.label }}</label>
    <input
      type="password"
      name="{{ field.html_name }}"
      class="w-full bg-transparent border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-twitter transition"
    />
    {% if field.errors %}
      <p class="text-red-400 text-xs mt-1">{{ field.errors|join:", " }}</p>
    {% endif %}
  </div>
  {% endfor %}
  <button type="submit" class="btn-primary w-full py-3">Alterar senha</button>
</form>
{% endblock %}
